name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout du code
        uses: actions/checkout@v3

      # 2. Installer Java 17
      - name: Installer Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Compiler le projet
      - name: Compiler le projet
        run: mvn compile

      # 4. Exécuter les tests
      - name: Exécuter les tests
        run: mvn test

      # 5. Vérifier Checkstyle
      - name: Vérifier Checkstyle
        run: mvn checkstyle:check

      # 6. Générer le rapport JaCoCo
      - name: Générer le rapport de couverture JaCoCo
        run: mvn jacoco:report

      # 7. Publier le rapport JaCoCo comme artefact
      - name: Publier le rapport JaCoCo
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: target/site/jacoco/
